<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💈 Barber Store System</title>

<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;margin:0;padding:20px}
h2{text-align:center;color:#d4af37}
.card{background:#1c1c1c;padding:15px;margin-top:12px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
button{width:100%;padding:10px;margin-top:8px;background:#d4af37;border:none;border-radius:8px}
.item{background:#222;padding:10px;margin-top:8px;border-radius:8px}
.price{color:#00ff99}
</style>
</head>

<body>

<h2>💈 Barber Store System</h2>

<div class="card">
<h3>🛍️ الخدمات</h3>
<select id="service">
<option value="50">Haircut - 50 SAR</option>
<option value="30">Beard Trim - 30 SAR</option>
<option value="80">VIP Package - 80 SAR</option>
</select>
</div>

<div class="card">
<h3>📅 حجز خدمة</h3>
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="9665xxxxxxx">
<input type="date" id="date">

<select id="time">
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>1:00</option>
<option>2:00</option>
<option>3:00</option>
<option>4:00</option>
<option>5:00</option>
</select>

<button onclick="book()">حجز الخدمة</button>
</div>

<div class="card">
<h3>📊 إجمالي الدخل</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📋 الحجوزات</h3>
<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9gisGE9DccYqIbhoyTTOasYxlLXaKQVs",
  authDomain: "barber-cx.firebaseapp.com",
  projectId: "barber-cx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// 📅 BOOKING
//
window.book = async function(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;

let service = document.getElementById("service");

if(!name || !phone || !date || !time){
alert("اكمل البيانات");
return;
}

await addDoc(collection(db,"bookings"),{
name,
phone,
date,
time,
service:service.options[service.selectedIndex].text,
price:Number(service.value),
created:Date.now()
});

load();
};

//
// 🗑️ DELETE
//
window.del = async function(id){
await deleteDoc(doc(db,"bookings",id));
load();
};

//
// 📋 LOAD DATA (FIXED)
//
async function load(){
let snap = await getDocs(collection(db,"bookings"));

let arr=[];
let total=0;

snap.forEach(d=>{
arr.push({id:d.id,...d.data()});
});

let html="";

arr.forEach(o=>{
total += Number(o.price || 0);

// WhatsApp
let msg = `مرحبا ${o.name} 💈
تم تأكيد حجزك:
🛍️ ${o.service}
📅 ${o.date}
⏰ ${o.time}
ننتظرك في الموعد 👍`;

let phone = (o.phone || "").replace("+","");
let waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

html += `
<div class="item">
<b>${o.name}</b><br>
📞 ${o.phone}<br>
🛍️ ${o.service}<br>
📅 ${o.date} ⏰ ${o.time}<br>

<a href="${waUrl}" target="_blank">
<button>📲 واتساب</button>
</a>

<button onclick="del('${o.id}')">🗑️ حذف</button>
</div>`;
});

document.getElementById("list").innerHTML = html;
document.getElementById("stats").innerHTML = total + " SAR";
}

load();
</script>

</body>
</html>
