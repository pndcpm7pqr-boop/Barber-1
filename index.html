<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💈 Barber Pro System</title>

<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;margin:0;padding:20px}
h2{text-align:center;color:#d4af37}
.card{background:#1c1c1c;padding:15px;margin-top:12px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
button{width:100%;padding:10px;margin-top:8px;background:#d4af37;border:none;border-radius:8px}
.item{background:#222;padding:10px;margin-top:8px;border-radius:8px}
.price{color:#00ff99}
.vip{color:#ffd700}
</style>
</head>

<body>

<h2>💈 نظام الحلاقة الاحترافي</h2>

<div class="card">
<h3>🛍️ الخدمات</h3>
<select id="service">
<option value="50">حلاقة شعر - 50 ريال</option>
<option value="30">تهذيب لحية - 30 ريال</option>
<option value="80">باقة VIP - 80 ريال</option>
<option value="100">تنظيف بشرة - 100 ريال</option>
</select>
</div>

<div class="card">
<h3>📅 حجز خدمة</h3>
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="9665xxxxxxx">
<input type="date" id="date">
<input type="time" id="time">

<button onclick="book()">حجز الخدمة</button>
</div>

<div class="card">
<h3>📊 إجمالي الدخل</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📋 الحجوزات</h3>
<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9gisGE9DccYqIbhoyTTOasYxlLXaKQVs",
  authDomain: "barber-cx.firebaseapp.com",
  projectId: "barber-cx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// 📅 BOOKING + VISITS SYSTEM
//
window.book = async function(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let service = document.getElementById("service");

if(!name || !phone || !date || !time){
alert("اكمل البيانات");
return;
}

// 1️⃣ حفظ الحجز
await addDoc(collection(db,"bookings"),{
name,
phone,
date,
time,
service:service.options[service.selectedIndex].text,
price:Number(service.value),
created:Date.now()
});

// 2️⃣ تحديث العملاء (عدد الزيارات)
let q = query(collection(db,"customers"), where("phone","==",phone));
let snap = await getDocs(q);

if(snap.empty){
await addDoc(collection(db,"customers"),{
name,
phone,
visits:1
});
}else{
snap.forEach(async (d)=>{
let newVisits = (d.data().visits || 0) + 1;
await updateDoc(doc(db,"customers",d.id),{
visits:newVisits,
name
});
});
}

alert("✅ تم الحجز وتسجيل الزيارة 💈");

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("date").value="";
document.getElementById("time").value="";

load();
};

//
// 🗑️ DELETE
//
window.del = async function(id){
await deleteDoc(doc(db,"bookings",id));
load();
};

//
// 📋 LOAD DATA + WHATSAPP + VISITS
//
async function load(){

let snap = await getDocs(collection(db,"bookings"));
let cSnap = await getDocs(collection(db,"customers"));

let customers = {};
cSnap.forEach(c=>{
customers[c.data().phone] = c.data().visits;
});

let arr=[];
let total=0;

snap.forEach(d=>{
arr.push({id:d.id,...d.data()});
});

let html="";

arr.forEach(o=>{
total += Number(o.price || 0);

// 📊 عدد الزيارات
let visits = customers[o.phone] || 1;

// 💈 واتساب
let msg = `مرحبا ${o.name} 💈
تم تأكيد حجزك:
🛍️ ${o.service}
📅 ${o.date}
⏰ ${o.time}
👤 عدد زياراتك: ${visits}
ننتظرك في الموعد 👍`;

// تنظيف الرقم
let rawPhone = (o.phone || "").replace(/\D/g,"");
if(rawPhone.startsWith("0")){
rawPhone = "966" + rawPhone.substring(1);
}

let waUrl = `https://wa.me/${rawPhone}?text=${encodeURIComponent(msg)}`;

html += `
<div class="item">
<b>${o.name}</b><br>
📞 ${o.phone}<br>
🛍️ ${o.service}<br>
📅 ${o.date} ⏰ ${o.time}<br>

<span class="vip">👤 عدد الزيارات: ${visits}</span><br>

<a href="${waUrl}" target="_blank">
<button>📲 واتساب</button>
</a>

<button onclick="del('${o.id}')">🗑️ حذف</button>
</div>`;
});

document.getElementById("list").innerHTML = html;
document.getElementById("stats").innerHTML = total + " ريال";
}

load();
</script>

</body>
</html>
