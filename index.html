<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💈 Barber Store + WhatsApp</title>

<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;margin:0;padding:20px}
h2{text-align:center;color:#d4af37}
.card{background:#1c1c1c;padding:15px;margin-top:12px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
button{width:100%;padding:10px;margin-top:8px;background:#d4af37;border:none;border-radius:8px}
.item{background:#222;padding:10px;margin-top:8px;border-radius:8px}
.price{color:#00ff99}
</style>
</head>

<body>

<div id="login">
<h2>🔐 دخول المتجر</h2>
<input id="u" placeholder="user">
<input id="p" type="password" placeholder="pass">
<button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">

<h2>💈 Barber Store</h2>

<div class="card">
<h3>🛍️ الخدمات</h3>
<select id="service">
<option value="50">Haircut - 50 SAR</option>
<option value="30">Beard Trim - 30 SAR</option>
<option value="80">VIP Package - 80 SAR</option>
</select>
</div>

<div class="card">
<h3>📅 حجز خدمة</h3>
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الجوال (مثال 9665xxxxxxx)">
<input type="date" id="date">

<select id="time">
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>1:00</option>
<option>2:00</option>
<option>3:00</option>
<option>4:00</option>
<option>5:00</option>
</select>

<button onclick="book()">حجز الخدمة</button>
</div>

<div class="card">
<h3>📊 لوحة المتجر</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📋 الحجوزات</h3>
<div id="list"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9gisGE9DccYqIbhoyTTOasYxlLXaKQVs",
  authDomain: "barber-cx.firebaseapp.com",
  projectId: "barber-cx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// login
window.login=function(){
if(u.value=="admin" && p.value=="1234"){
login.style.display="none";
app.style.display="block";
load();
}else alert("خطأ في الدخول");
}

// book
window.book = async function(){

let service = document.getElementById("service");
let price = service.value;

await addDoc(collection(db,"orders"),{
name:name.value,
phone:phone.value,
date:date.value,
time:time.value,
service:service.options[service.selectedIndex].text,
price:Number(price),
created:Date.now()
});

load();
}

// delete
window.del = async function(id){
await deleteDoc(doc(db,"orders",id));
load();
}

// load
async function load(){
let snap = await getDocs(collection(db,"orders"));

let arr=[];
let total=0;

snap.forEach(d=>{
arr.push({id:d.id,...d.data()});
});

let html="";

arr.forEach(o=>{
total += o.price;

// 💈 رسالة واتساب جاهزة
let msg = `مرحبا ${o.name} 💈
تم تأكيد حجزك:
🛍️ ${o.service}
📅 ${o.date}
⏰ ${o.time}
ننتظرك في الموعد 👍`;

let phone = o.phone.replace("+","");
let waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

html += `
<div class="item">
<b>${o.name}</b><br>
🛍️ ${o.service}<br>
💰 <span class="price">${o.price} SAR</span><br>
📅 ${o.date} ⏰ ${o.time}<br>

<a href="${waUrl}" target="_blank">
<button>📲 إرسال واتساب</button>
</a>

<button onclick="del('${o.id}')">🗑️ حذف</button>
</div>`;
});

list.innerHTML = html;
stats.innerHTML = "إجمالي الدخل: " + total + " SAR";
}

load();
</script>

</body>
</html>
