<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💈 Barber Pro System</title>

<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;margin:0;padding:20px}
h2{text-align:center;color:#d4af37}
.card{background:#1c1c1c;padding:15px;margin-top:12px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
button{width:100%;padding:10px;margin-top:8px;background:#d4af37;border:none;border-radius:8px}
.item{background:#222;padding:10px;margin-top:8px;border-radius:8px}
.vip{color:#ffd700}
</style>
</head>

<body>

<h2>💈 نظام الحلاقة الاحترافي</h2>

<!-- 🔍 SEARCH -->
<div class="card">
<h3>🔍 بحث عن عميل</h3>
<input id="searchPhone" placeholder="9665xxxxxxx">
<button onclick="searchCustomer()">بحث</button>
<div id="result"></div>
</div>

<!-- 🛍️ SERVICES -->
<div class="card">
<h3>🛍️ الخدمات</h3>
<select id="service">

<option value="40">✂️ حلاقة شعر عادية - 40 ريال</option>
<option value="60">🧔‍♂️ حلاقة + لحية - 60 ريال</option>
<option value="30">🧔 تهذيب لحية - 30 ريال</option>
<option value="80">💈 باقة VIP - 80 ريال</option>
<option value="100">🧼 تنظيف بشرة - 100 ريال</option>
<option value="50">💇‍♂️ أطفال - 50 ريال</option>
<option value="120">🔥 باقة عريس VIP - 120 ريال</option>

</select>
</div>

<!-- 📅 BOOKING -->
<div class="card">
<h3>📅 حجز خدمة</h3>
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="9665xxxxxxx">
<input type="date" id="date">
<input type="time" id="time">

<button onclick="book()">حجز الخدمة</button>
</div>

<!-- 📊 STATS -->
<div class="card">
<h3>📊 إجمالي الدخل</h3>
<div id="stats"></div>
</div>

<!-- 📋 BOOKINGS -->
<div class="card">
<h3>📋 الحجوزات</h3>
<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9gisGE9DccYQYbhoyTTOasYxlLXaKQVs",
  authDomain: "barber-cx.firebaseapp.com",
  projectId: "barber-cx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// 💈 BOOKING (FIXED VISITS)
//
window.book = async function(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let service = document.getElementById("service");

if(!name || !phone || !date || !time){
alert("اكمل البيانات");
return;
}

// 🔥 تنظيف الرقم
let cleanPhone = phone.replace(/\D/g,"");
if(cleanPhone.startsWith("0")){
cleanPhone = "966" + cleanPhone.substring(1);
}

// 👤 جلب العميل
let customerRef = doc(db,"customers",cleanPhone);
let customerSnap = await getDoc(customerRef);

let visits = 0;
let free = false;

if(customerSnap.exists()){
visits = customerSnap.data().visits || 0;
}

// ➕ زيادة زيارة
visits = visits + 1;

// 🎁 مجانية عند 5
if(visits === 5){
free = true;
alert("🎉 مبروك! هذه الزيارة مجانية 💈");
visits = 0;
}

// 💾 حفظ العميل
await setDoc(customerRef,{
name,
phone:cleanPhone,
visits,
freeVisits: (customerSnap.data()?.freeVisits || 0) + (free ? 1 : 0),
lastVisit: date + " " + time
});

// 🔥 إعادة قراءة البيانات بعد الحفظ (حل المشكلة نهائياً)
let updatedSnap = await getDoc(customerRef);
let updatedVisits = updatedSnap.data().visits;

// 📅 حفظ الحجز
await addDoc(collection(db,"bookings"),{
name,
phone:cleanPhone,
date,
time,
service:service.options[service.selectedIndex].text,
price:Number(service.value),
created:Date.now()
});

// 💈 رسالة واتساب
let msg = free ?
`🎉 مبروك ${name} 💈

هذه الزيارة علينا مجاناً 🎁

لقد أكملت 5 زيارات معنا ❤️` :

`مرحبا ${name} 💈
تم تأكيد حجزك:

🛍️ ${service.options[service.selectedIndex].text}
📅 ${date}
⏰ ${time}

👤 عدد زياراتك: ${updatedVisits}/5

ننتظرك 👍`;

let waUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;

alert("تم الحجز 💈");
window.open(waUrl,"_blank");

// تنظيف
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("date").value="";
document.getElementById("time").value="";

load();
};

//
// 🔍 SEARCH
//
window.searchCustomer = async function(){

let phone = document.getElementById("searchPhone").value.trim();
let result = document.getElementById("result");

if(!phone){
alert("اكتب رقم");
return;
}

let cleanPhone = phone.replace(/\D/g,"");
if(cleanPhone.startsWith("0")){
cleanPhone = "966" + cleanPhone.substring(1);
}

let snap = await getDoc(doc(db,"customers",cleanPhone));

if(!snap.exists()){
result.innerHTML = "❌ لا يوجد عميل";
return;
}

let d = snap.data();

result.innerHTML = `
<div class="item">
<b>👤 ${d.name}</b><br>
📞 ${d.phone}<br>
👤 الزيارات: ${d.visits}/5<br>
🎁 مجانية: ${d.freeVisits || 0}<br>
📅 آخر زيارة: ${d.lastVisit || "لا يوجد"}
</div>
`;
};

//
// 🗑️ DELETE
//
window.del = async function(id){
await deleteDoc(doc(db,"bookings",id));
load();
};

//
// 📋 LOAD (NEWEST FIRST)
//
async function load(){

let snap = await getDocs(collection(db,"bookings"));

let arr=[];
let total=0;

snap.forEach(d=>{
arr.push({id:d.id, ...d.data()});
});

arr.sort((a,b)=> b.created - a.created);

let html="";

arr.forEach(o=>{
total += Number(o.price || 0);

let waUrl = `https://wa.me/${o.phone}?text=${encodeURIComponent(
`مرحبا ${o.name} 💈
تم تأكيد حجزك:
🛍️ ${o.service}
📅 ${o.date}
⏰ ${o.time}`
)}`;

html += `
<div class="item">
<b>${o.name}</b><br>
📞 ${o.phone}<br>
🛍️ ${o.service}<br>
📅 ${o.date} ⏰ ${o.time}<br>

<a href="${waUrl}" target="_blank">
<button>📲 واتساب</button>
</a>

<button onclick="del('${o.id}')">🗑️ حذف</button>
</div>`;
});

document.getElementById("list").innerHTML = html;
document.getElementById("stats").innerHTML = total + " ريال";
}

load();
</script>

</body>
</html>
