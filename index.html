<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💈 Barber Pro System</title>

<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;margin:0;padding:20px}
h2{text-align:center;color:#d4af37}
.card{background:#1c1c1c;padding:15px;margin-top:12px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
button{width:100%;padding:10px;margin-top:8px;background:#d4af37;border:none;border-radius:8px}
.item{background:#222;padding:10px;margin-top:8px;border-radius:8px}
.vip{color:#ffd700}
</style>
</head>

<body>

<h2>💈 نظام الحلاقة الاحترافي</h2>

<div class="card">
<h3>🛍️ الخدمات</h3>
<select id="service">
<option value="50">حلاقة شعر - 50 ريال</option>
<option value="30">تهذيب لحية - 30 ريال</option>
<option value="80">باقة VIP - 80 ريال</option>
<option value="100">تنظيف بشرة - 100 ريال</option>
</select>
</div>

<div class="card">
<h3>📅 حجز خدمة</h3>
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="9665xxxxxxx">
<input type="date" id="date">
<input type="time" id="time">

<button onclick="book()">حجز الخدمة</button>
</div>

<div class="card">
<h3>📊 إجمالي الدخل</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📋 الحجوزات</h3>
<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9gisGE9DccYQIbhoyTTOasYxlLXaKQVs",
  authDomain: "barber-cx.firebaseapp.com",
  projectId: "barber-cx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// 💈 BOOKING + LOYALTY SYSTEM
//
window.book = async function(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let service = document.getElementById("service");

if(!name || !phone || !date || !time){
alert("اكمل البيانات");
return;
}

// 🔥 تنظيف الرقم
let cleanPhone = phone.replace(/\D/g,"");
if(cleanPhone.startsWith("0")){
cleanPhone = "966" + cleanPhone.substring(1);
}

// 👤 جلب العميل
let customerRef = doc(db,"customers",cleanPhone);
let customerSnap = await getDoc(customerRef);

let visits = 1;
let free = false;

if(customerSnap.exists()){
visits = (customerSnap.data().visits || 0) + 1;
}

// 🎁 نظام المكافأة (كل 5 زيارات)
if(visits === 5){
free = true;
alert("🎉 مبروك! حصل العميل على خدمة مجانية 💈");
visits = 0;
}

// 💾 حفظ العميل
await setDoc(customerRef,{
name,
phone:cleanPhone,
visits,
freeVisits: (customerSnap.data()?.freeVisits || 0) + (free ? 1 : 0),
lastVisit: date + " " + time
});

// 📅 حفظ الحجز
await addDoc(collection(db,"bookings"),{
name,
phone:cleanPhone,
date,
time,
service:service.options[service.selectedIndex].text,
price:Number(service.value),
created:Date.now()
});

// 💈 رسالة واتساب
let msg = "";

if(free){
msg = `🎉 مبروك ${name} 💈

هذه الزيارة علينا مجاناً 🎁

🪒 لقد أكملت 5 زيارات معنا
✨ استمتع بالخدمة المجانية اليوم

ننتظرك في الموعد ❤️`;
}else{
msg = `مرحبا ${name} 💈
تم تأكيد حجزك:

🛍️ ${service.options[service.selectedIndex].text}
📅 ${date}
⏰ ${time}

👤 عدد زياراتك: ${visits}

ننتظرك في الموعد 👍`;
}

let waUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;

alert("✅ تم الحجز بنجاح 💈\nاضغط موافق للانتقال للواتساب");

window.open(waUrl, "_blank");

// تنظيف
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("date").value="";
document.getElementById("time").value="";

load();
};

//
// 🗑️ DELETE
//
window.del = async function(id){
await deleteDoc(doc(db,"bookings",id));
load();
};

//
// 📋 LOAD
//
async function load(){

let snap = await getDocs(collection(db,"bookings"));

let html="";
let total=0;

snap.forEach(d=>{
let o = d.data();
total += Number(o.price || 0);

html += `
<div class="item">
<b>${o.name}</b><br>
📞 ${o.phone}<br>
🛍️ ${o.service}<br>
📅 ${o.date} ⏰ ${o.time}<br>

<button onclick="del('${d.id}')">🗑️ حذف</button>
</div>`;
});

document.getElementById("list").innerHTML = html;
document.getElementById("stats").innerHTML = total + " ريال";
}

load();
</script>

</body>
</html>
